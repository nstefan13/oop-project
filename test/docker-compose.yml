
services:
  mongo:
    image: mongo:latest
    container_name: vuln-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  provider:
    build: .
    container_name: vuln-provider
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017

volumes:
  mongo-data:
